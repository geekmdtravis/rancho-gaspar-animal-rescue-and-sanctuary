name: CI

# Mirrors the local git hooks exactly: the same gates run here and on every
# developer's machine. The i18n check is blocking everywhere — a translation
# that has drifted out of sync fails the build and blocks the merge.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type-check (astro check)
        run: npm run check

      - name: EN / PT-BR parity (staleness is blocking)
        run: npm run i18n:check

      - name: Unit tests
        run: npm run test:unit

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2e (builds fresh)
        run: npm run test:e2e
